<!DOCTYPE html>
<html>
<head>
    <title>Mini Framework Level 4</title>
</head>

<body>

<div id="root"></div>

<script>

/* ---------------- createElement ---------------- */
function createElement(type, props, ...children){
    return {
        type,
        props: {
            ...props,
            children: children.flat()
        }
    };
}

/* ---------------- Global State ---------------- */
let hooks = [];
let hookIndex = 0;

let AppRef = null;
let RootRef = null;

let oldVNode = null;
let rootDOM = null;

/* ---------------- RENDER QUEUE (NEW) ---------------- */
let isRendering = false;
let updateQueue = new Set();

/* ---------------- SCHEDULED RENDER (NEW CORE) ---------------- */
function scheduleRender(){

    updateQueue.add(true);

    if (isRendering) return;

    isRendering = true;

    queueMicrotask(() => {

        if (updateQueue.size > 0){
            updateQueue.clear();
            render();
        }

        isRendering = false;
    });
}

/* ---------------- useState (BATCHED) ---------------- */
function useState(initial){

    const current = hookIndex;

    hooks[current] = hooks[current] ?? initial;

    function setState(newValue){

        hooks[current] = newValue;

        // IMPORTANT: no direct render
        scheduleRender();
    }

    hookIndex++;

    return [hooks[current], setState];
}

/* ---------------- useEffect ---------------- */
function useEffect(fn, deps){

    const current = hookIndex;
    const oldDeps = hooks[current];

    let changed = true;

    if (oldDeps){
        changed = deps.some((d, i) => d !== oldDeps[i]);
    }

    if (changed){
        queueMicrotask(fn);
        hooks[current] = deps;
    }

    hookIndex++;
}

/* ---------------- DOM creation ---------------- */
function createDOMNode(vNode){

    if (typeof vNode === "string" || typeof vNode === "number"){
        return document.createTextNode(vNode);
    }

    if (typeof vNode.type === "function"){
        return createDOMNode(vNode.type(vNode.props));
    }

    const el = document.createElement(vNode.type);

    const props = vNode.props || {};

    Object.entries(props).forEach(([k, v]) => {

        if (k === "children") return;

        if (k.startsWith("on")){
            el.addEventListener(k.slice(2).toLowerCase(), v);
        } else {
            el[k] = v;
        }

    });

    return el;
}

/* ---------------- Props update ---------------- */
function updateProps(dom, oldProps, newProps){

    for (let k in oldProps){
        if (!(k in newProps) && !k.startsWith("on")){
            dom[k] = "";
        }
    }

    for (let k in newProps){
        if (k === "children") continue;

        if (k.startsWith("on")){
            dom[k.toLowerCase()] = newProps[k];
        } else {
            dom[k] = newProps[k];
        }
    }
}

/* ---------------- DIFF (simplified stable version) ---------------- */
function diff(oldVNode, newVNode, parent){

    if (!newVNode){
        parent.innerHTML = "";
        return null;
    }

    if (!oldVNode || oldVNode.type !== newVNode.type){
        const newDOM = createDOMNode(newVNode);
        parent.replaceWith(newDOM);
        return newDOM;
    }

    if (typeof newVNode === "string" || typeof newVNode === "number"){
        if (oldVNode !== newVNode){
            parent.textContent = newVNode;
        }
        return parent;
    }

    updateProps(parent, oldVNode.props || {}, newVNode.props || {});

    const oldChildren = oldVNode.props?.children || [];
    const newChildren = newVNode.props?.children || [];

    const max = Math.max(oldChildren.length, newChildren.length);

    for (let i = 0; i < max; i++){
        diff(oldChildren[i], newChildren[i], parent.childNodes[i]);
    }

    return parent;
}

/* ---------------- Render ---------------- */
function render(){

    hookIndex = 0;

    const newVNode = AppRef();

    if (!oldVNode){
        rootDOM = createDOMNode(newVNode);
        RootRef.appendChild(rootDOM);
        oldVNode = newVNode;
        return;
    }

    rootDOM = diff(oldVNode, newVNode, rootDOM);
    oldVNode = newVNode;
}

/* ---------------- Start ---------------- */
function start(App, root){
    AppRef = App;
    RootRef = root;
    render();
}

/* ---------------- App ---------------- */
function App(){
    return createElement(
        "div",
        null,
        createElement("h1", null, "Level 4 Framework 🚀"),
        createElement(Counter, null)
    );
}

/* ---------------- Counter ---------------- */
function Counter(){

    const [count, setCount] = useState(0);

    useEffect(() => {
        console.log("Count changed:", count);
    }, [count]);

    return createElement(
        "div",
        null,
        createElement("h2", null, `Count: ${count}`),
        createElement(
            "button",
            {
                onClick: () => setCount(count + 1)
            },
            "Increase"
        )
    );
}

/* ---------------- boot ---------------- */
start(App, document.getElementById("root"));

</script>

</body>
</html>
