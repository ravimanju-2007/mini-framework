<!DOCTYPE html>
<html>
<head>
    <title>Mini Framework</title>
</head>

<body>

<div id="root"></div>

<script>

function createElement(type, props, ...children){
    return {
        type,
        props: {
            ...props,
            children
        }
    };
}

let hooks = [];
let hookIndex = 0;

let AppRef = null;
let RootRef = null;

/* ---------------- useState ---------------- */
function useState(initial){

    const current = hookIndex;

    hooks[current] = hooks[current] ?? initial;

    const setState = (newValue) => {
        hooks[current] = newValue;
        render();
    };

    hookIndex++;

    return [hooks[current], setState];
}

/* ---------------- useEffect ---------------- */
function useEffect(fn, deps){

    const current = hookIndex;
    const oldDeps = hooks[current];

    let changed = true;

    if (oldDeps){
        changed = deps.some((dep, i) => dep !== oldDeps[i]);
    }

    if (changed){
        queueMicrotask(fn);
        hooks[current] = deps;
    }

    hookIndex++;
}

/* ---------------- DOM ---------------- */
function createDOMNode(vNode){

    if (typeof vNode === "string" || typeof vNode === "number"){
        return document.createTextNode(vNode);
    }

    if (typeof vNode.type === "function"){
        return createDOMNode(vNode.type(vNode.props));
    }

    const el = document.createElement(vNode.type);

    const props = vNode.props || {};

    Object.entries(props).forEach(([k, v]) => {

        if (k === "children") return;

        if (k.startsWith("on")){
            el.addEventListener(k.slice(2).toLowerCase(), v);
        } else {
            el[k] = v;
        }

    });

    (props.children || []).forEach(child => {
        el.appendChild(createDOMNode(child));
    });

    return el;
}

/* ---------------- Render ---------------- */
function render(){

    hookIndex = 0;

    RootRef.innerHTML = "";

    const vNode = AppRef();

    RootRef.appendChild(createDOMNode(vNode));
}

/* ---------------- Start ---------------- */
function start(App, root){
    AppRef = App;
    RootRef = root;
    render();
}

/* ---------------- App ---------------- */
function App(){
    return createElement(
        "div",
        null,
        createElement("h1", null, "My PulseUI App"),
        createElement(Counter, null)
    );
}

/* ---------------- Counter ---------------- */
function Counter(){

    const [count, setCount] = useState(0);

    useEffect(() => {
        console.log("Count changed:", count);
    }, [count]);

    return createElement(
        "div",
        null,
        createElement("h1", null, `Count: ${count}`),
        createElement(
            "button",
            {
                onClick: () => setCount(count + 1)
            },
            "Increase"
        )
    );
}

/* ---------------- Bootstrap ---------------- */
const root = document.getElementById("root");

start(App, root);

</script>

</body>
</html>
